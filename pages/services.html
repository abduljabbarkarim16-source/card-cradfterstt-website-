    html { scroll-behavior: smooth; }
    * {
      transition: color 150ms cubic-bezier(0.4, 0, 0.2, 1), background-color 150ms cubic-bezier(0.4, 0, 0.2, 1), border-color 150ms cubic-bezier(0.4, 0, 0.2, 1), opacity 150ms cubic-bezier(0.4, 0, 0.2, 1), transform 150ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }
    button:active:not(:disabled) {
      transform: translateY(0);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.5);
    }
    select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(255,255,255,0.92) 50%),
        linear-gradient(135deg, rgba(255,255,255,0.92) 50%, transparent 50%);
      background-position:
        calc(100% - 22px) calc(50% - 3px),
        calc(100% - 15px) calc(50% - 3px);
      background-size: 7px 7px, 7px 7px;
      background-repeat: no-repeat;
      padding-right: 3.5rem;
    }
    select option {
      background: #111111;
      color: #f8fafc;
    }
    .cta-sheen {
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    .cta-sheen::after {
      content: "";
      position: absolute;
      inset: -30% auto -30% -35%;
      width: 38%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      transform: translateX(-140%) skewX(-18deg);
      animation: sheenSweep 5.5s ease-in-out infinite;
      pointer-events: none;
    }
    [class*="rounded-[1.6rem]"],
    [class*="rounded-[1.75rem]"],
    [class*="rounded-[1.8rem]"],
    [class*="rounded-[2rem]"],
    .rounded-2xl {
      transform-style: preserve-3d;
      will-change: transform;
    }
    [class*="rounded-[1.6rem]"]:hover,
    [class*="rounded-[1.75rem]"]:hover,
    [class*="rounded-[1.8rem]"]:hover,
    [class*="rounded-[2rem]"]:hover,
    .rounded-2xl:hover {
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.22);
    }
    @keyframes sheenSweep {
      0%, 70%, 100% { transform: translateX(-140%) skewX(-18deg); }
      26% { transform: translateX(360%) skewX(-18deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    function formatCurrency(value) {

      return {
        id: String(item?.id ?? `cart-item-${index}`),
        title: item?.title || item?.name || "Cart Item",
        subtitle: item?.subtitle || "",
        price: Number(item?.price || 0),
        quantity: Math.max(1, Number(item?.quantity || 1)),
      };
    }

    function createEmptyShoppingItem() {

        url: "",
        description: "",
        priceUsd: 0,
        priceTtd: 0,
      };

    function normalizeShoppingItem(item, index) {
      return {
        id: String(item?.id ?? `shopping-item-${index}`),
        url: String(item?.url || ""),
        description: String(item?.description || ""),
        priceUsd: Number(item?.priceUsd || 0),
        priceTtd: Number(item?.priceTtd || 0),
      };
    }

    function getShoppingItemsTotalUSD() {
      return state.shoppingItems.reduce((sum, item) => sum + Number(item.priceUsd || 0), 0);

    function saveCart() {
      try {
        localStorage.setItem("cardCraftersCart", JSON.stringify(state.cart.map(normalizeCartItem)));
      } catch (error) {
        console.warn("Unable to save cart", error);
      }
    }

    function loadCart() {
      try {
        const saved = JSON.parse(localStorage.getItem("cardCraftersCart") || "[]");
        state.cart = Array.isArray(saved) ? saved.map(normalizeCartItem) : [];
      } catch (error) {
        console.warn("Unable to load cart", error);
        state.cart = [];
      }
    }

    function setState(updates) {
      Object.assign(state, updates);
      saveCart();
      render();
    }

    function normalizeThemeKey(value) {
      return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    }

    function getProductTheme(value, fallbackKey = 'other') {
      const rawKey = normalizeThemeKey(value);
      const mappedKey = PRODUCT_THEME_ALIASES[rawKey] || rawKey.replace(/\s+/g, '');
      return PRODUCT_THEMES[mappedKey] || PRODUCT_THEMES[fallbackKey] || PRODUCT_THEMES.other;
    }

    function getBadgeLabel(title) {
      const theme = getProductTheme(title);
      const words = String(theme.title || title || 'CC').replace(/[^A-Za-z0-9+ ]/g, '').split(/\s+/).filter(Boolean);
      if (theme.title === 'Disney+') return 'D+';
      if (theme.title === 'Prime Video') return 'PV';
      if (theme.title === 'Max') return 'MX';
      if (theme.title === 'Other') return 'OT';
      if (words.length === 1) return words[0].slice(0, 2).toUpperCase();
      return `${words[0][0] || ''}${words[1][0] || ''}`.toUpperCase();
    }

    function getCategoryTheme(categoryId) {
      return CATEGORY_THEMES[categoryId] || CATEGORY_THEMES['gift-cards'];
    }

    function renderServiceTile(title, size = 'md', sublabel, overrides = {}) {
      const theme = { ...getProductTheme(title), ...overrides };
      const sizeMap = {
        sm: 'h-12 w-12 rounded-[1rem] text-[13px]',
        md: 'h-16 w-16 rounded-[1.2rem] text-[16px]',
        lg: 'h-20 w-20 rounded-[1.35rem] text-[19px]',
      };
      const sizeClass = sizeMap[size] || sizeMap.md;
      const badge = overrides.badge || getBadgeLabel(title);
      return `
        <div class="relative ${sizeClass} shrink-0 overflow-hidden border border-yellow-500/20 bg-[#050505] shadow-[0_0_0_1px_rgba(255,215,0,0.08),0_18px_48px_rgba(0,0,0,0.28)]">
          <div class="absolute inset-0 shadow-[inset_0_0_0_1px_rgba(255,215,0,0.12)]"></div>
          <div class="absolute inset-x-0 top-0 h-1/2 opacity-90" style="background: linear-gradient(180deg, ${theme.accent}55 0%, transparent 100%);"></div>
          <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(255,255,255,0.08),transparent_45%)]"></div>
          <div class="absolute bottom-0 left-1/2 h-[2px] w-10 -translate-x-1/2 bg-gradient-to-r from-transparent via-yellow-400 to-transparent opacity-70"></div>
          <div class="relative flex h-full w-full flex-col items-center justify-center px-1 text-center">
            <div class="font-bold tracking-[0.25em]" style="color:${theme.accent}; text-shadow: 0 0 18px ${theme.accent}, 0 0 30px ${theme.glow};">${badge}</div>
            <div class="mt-1 text-[8px] uppercase tracking-[0.2em] text-zinc-400">${sublabel || theme.sublabel || 'Card Crafters'}</div>
          </div>
        </div>
      `;

        if (state.view.category === "streaming") {
          mainContent = renderStreamingDetail();
        } else if (state.view.category === "gift-cards") {
          mainContent = renderGiftCardDetail();

        }
      }

      const cartCount = state.cart.reduce((sum, item) => sum + item.quantity, 0);

      app.innerHTML = `
        ${renderCartDrawer()}
        <header class="sticky top-0 z-50 border-b border-white/10 bg-[#090909]/88 backdrop-blur-xl">
          <div class="mx-auto flex max-w-7xl items-center justify-between gap-6 px-4 py-4 sm:px-6 lg:px-8">
            <a href="/" class="flex items-center gap-4">
              <div class="shrink-0 rounded-[1.65rem] border border-yellow-400/20 bg-gradient-to-br from-[#17110b] via-[#0d0d0d] to-[#090909] p-2 shadow-[0_18px_40px_rgba(0,0,0,0.4)]">
                <img src="../images/card-crafters-monogram-glow.png" alt="Card Crafters monogram" class="h-12 w-12 rounded-[1.1rem] object-cover" onerror="this.style.display='none'" />
              </div>
              <div>
                <p class="text-sm font-semibold uppercase tracking-[0.34em] text-yellow-300">Card Crafters</p>
                <p class="mt-1 text-xs text-zinc-400">Order your digital services with local payment options</p>
              </div>
            </a>

            <div class="hidden lg:flex items-center gap-4">
              <nav class="flex items-center gap-2 rounded-full border border-white/10 bg-white/[0.03] p-1.5 shadow-[inset_0_0_0_1px_rgba(255,255,255,0.02)]">
                <a href="/" class="rounded-full border border-white/10 bg-transparent px-5 py-2.5 text-sm text-zinc-300 transition hover:border-yellow-500/30 hover:bg-yellow-500/10 hover:text-white">Home</a>
                <a href="/about" class="rounded-full border border-white/10 bg-transparent px-5 py-2.5 text-sm text-zinc-300 transition hover:border-yellow-500/30 hover:bg-yellow-500/10 hover:text-white">About</a>
                <a href="/services" class="rounded-full border border-yellow-500/30 bg-yellow-500/10 px-5 py-2.5 text-sm text-yellow-300 transition">Services</a>
              </nav>
            </div>

            <div class="flex items-center gap-3">
              <a
                href="/profile"
                aria-label="Profile"
                class="inline-flex h-12 w-12 items-center justify-center rounded-[1.2rem] border border-white/10 bg-white/[0.03] text-zinc-200 shadow-[inset_0_0_0_1px_rgba(255,255,255,0.02)] transition hover:border-yellow-500/30 hover:bg-yellow-500/10 hover:text-yellow-200"
              >
                <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M20 21a8 8 0 0 0-16 0" />
                  <circle cx="12" cy="8" r="4" />
                </svg>
              </a>

              <button onclick="app.openCart()" class="cta-sheen inline-flex items-center gap-3 rounded-[1.35rem] border border-yellow-500/30 bg-gradient-to-r from-yellow-500 to-yellow-300 px-5 py-3 text-sm font-semibold text-black shadow-[0_14px_34px_rgba(234,179,8,0.24)]">
                <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8">
                  <circle cx="9" cy="20" r="1.5" />
                  <circle cx="18" cy="20" r="1.5" />
                  <path d="M3 4h2l2.2 10.2a1 1 0 0 0 1 .8h9.9a1 1 0 0 0 1-.8L21 7H7" />
                </svg>
                Cart
                ${cartCount > 0 ? `<span class="inline-flex min-w-[24px] items-center justify-center rounded-full bg-black/10 px-2 py-1 text-xs">${cartCount}</span>` : ""}
              </button>
            </div>
          </div>
        </header>

        <main class="relative z-10">
          ${showHeroAndShowcase ? `
            <section class="mx-auto max-w-7xl px-4 pt-16 pb-12 sm:px-6 lg:px-8">
              <div class="space-y-4 max-w-4xl">
                <div class="inline-flex items-center gap-2 rounded-full border border-yellow-500/30 bg-yellow-500/10 px-3 py-1 text-xs uppercase tracking-[0.24em] text-yellow-300">
                  <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M12 3l1.7 4.3L18 9l-4.3 1.7L12 15l-1.7-4.3L6 9l4.3-1.7L12 3z" />
                    <path d="M19 15l.8 2.2L22 18l-2.2.8L19 21l-.8-2.2L16 18l2.2-.8L19 15z" />
                    <path d="M5 14l1 2.5L8.5 17 6 18l-1 2.5L4 18l-2.5-1L4 16.5 5 14z" />
                  </svg>
                  Premium Services
                </div>
                <h1 class="text-4xl sm:text-5xl font-semibold tracking-tight text-white leading-tight">
                  Digital access,
                  <span class="block text-yellow-200">handled locally.</span>
                </h1>
                <p class="mt-4 text-lg leading-8 text-zinc-300 max-w-3xl">
                  Seamless access to streaming services, gift cards, bill payments, and online shopping—all through local payment methods.
                </p>
              </div>
            </section>

            <section class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8">
              <div class="inline-flex items-center gap-2 rounded-full border border-yellow-500/30 bg-yellow-500/10 px-3 py-1 text-xs uppercase tracking-[0.24em] text-yellow-300 mb-6">
                <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M12 3l1.7 4.3L18 9l-4.3 1.7L12 15l-1.7-4.3L6 9l4.3-1.7L12 3z" />
                  <path d="M19 15l.8 2.2L22 18l-2.2.8L19 21l-.8-2.2L16 18l2.2-.8L19 15z" />
                  <path d="M5 14l1 2.5L8.5 17 6 18l-1 2.5L4 18l-2.5-1L4 16.5 5 14z" />
                </svg>
                Start Shopping

              <h2 class="text-3xl font-semibold tracking-tight text-white sm:text-3xl">

          ` : `
            <section class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
              <button onclick="app.navigateToCategories()" class="inline-flex items-center gap-2 rounded-2xl border border-yellow-500/30 bg-yellow-500/10 px-4 py-2 text-sm font-semibold text-yellow-300 hover:bg-yellow-500/20 transition-colors">

    // ============================================================================
    // APP API
    // ============================================================================

    const app = {
      navigateToCategories() {
        setState({ view: { screen: "categories" } });
      },
      navigateToCategory(categoryId) {
        if (categoryId === "gift-cards") {
          setState({
            view: { screen: "detail", category: "gift-cards", itemId: "builder" },
            giftCategoryId: giftCardCategories[0].id,
            giftBrand: giftCardCategories[0].brands[0],
            giftCustomName: "",
            giftDenominationId: giftCardDenominations[1].id,
            giftRegion: giftCardRegions[0],
          });
        } else {
          setState({ view: { screen: "items", category: categoryId } });
        }
      },
      navigateBack() {
        if (state.view.screen === "detail") {
          if (state.view.category === "gift-cards") {
            setState({ view: { screen: "categories" } });
          } else {
            setState({ view: { screen: "items", category: state.view.category } });
          }
        } else if (state.view.screen === "items") {
          setState({ view: { screen: "categories" } });
        }
      },
      openStreamingItem(itemId) {
        const item = streamingItems.find(x => x.id === itemId);
        if (item) {
          setState({
            view: { screen: "detail", category: "streaming", itemId },
            selectedStreamingOption: item.options[0].id,
          });
        }
      },
      openBillItem(itemId) {
        setState({
          view: { screen: "detail", category: "bill-payments", itemId },
          billName: "",
          billContact: "",
          billAmount: 0,
          billAccountNumber: "",
        });
      },
      openShoppingStore(itemId) {
        setState({
          view: { screen: "detail", category: "shopping", itemId },
          shoppingStoreName: "",
          shoppingNotes: "",
          shoppingItems: [createEmptyShoppingItem()],
          shoppingDestination: "company-delivery",
          shoppingSkyboxAddress: "",
          shoppingCustomsKey: customsCategories[0].key,
          deliveryFeeTTD: DEFAULT_DELIVERY_FEE,
        });
      },
      setSelectedStreamingOption(value) {
        setState({ selectedStreamingOption: value });
      },
      setGiftCategory(value) {
        const cat = giftCardCategories.find(x => x.id === value);
        if (cat) {
          setState({
            giftCategoryId: value,
            giftBrand: cat.brands[0],
            giftCustomName: "",
          });
        }
      },
      setGiftBrand(value) {
        setState({ giftBrand: value, giftCustomName: value === "Other" ? state.giftCustomName : "" });
      },
      setGiftCustomName(value) {
        setState({ giftCustomName: value });
      },
      setGiftDenomination(value) {
        setState({ giftDenominationId: value });
      },
      setGiftRegion(value) {
        setState({ giftRegion: value });
      },
      setBillName(value) {
        setState({ billName: value });
      },
      setBillContact(value) {
        setState({ billContact: value });
      },
      setBillAmount(value) {
        setState({ billAmount: Number(value || 0) });
      },
      setBillAccountNumber(value) {
        setState({ billAccountNumber: value });
      },
      setShoppingStoreName(value) {
        setState({ shoppingStoreName: value });
      },
      setShoppingNotes(value) {
        setState({ shoppingNotes: value });
      },
      setShoppingSkyboxAddress(value) {
        setState({ shoppingSkyboxAddress: value });
      },
      addShoppingItem() {
        setState({
          shoppingItems: [...state.shoppingItems, createEmptyShoppingItem()],
        });
      },
      removeShoppingItem(itemId) {
        const nextItems = state.shoppingItems.filter(item => item.id !== itemId);
        setState({
          shoppingItems: nextItems.length ? nextItems : [createEmptyShoppingItem()],
        });
      },
      updateShoppingItem(itemId, field, value) {
        const numericValue = Number(value || 0);
        setState({
          shoppingItems: state.shoppingItems.map(item => item.id === itemId
            ? field === "priceUsd"
              ? {
                  ...item,
                  priceUsd: numericValue,
                  priceTtd: numericValue * CUSTOMER_RATE,
                }
              : field === "priceTtd"
                ? {
                    ...item,
                    priceTtd: numericValue,
                    priceUsd: numericValue / CUSTOMER_RATE,
                  }
                : {
                    ...item,
                    [field]: value,
                  }
            : item),
        });
      },
      setShoppingDestination(value) {
        setState({ shoppingDestination: value });
      },
      setShoppingCustomsKey(value) {
        setState({ shoppingCustomsKey: value });
      },
      setDeliveryFee(value) {
        setState({ deliveryFeeTTD: Number(value || 0) });
      },
      addToCart(title, subtitle, price) {
        setState({
          cart: [...state.cart, { id: makeId(), title, subtitle, price, quantity: 1 }],
          cartOpen: true,
        });
      },
      addGiftCardToCart() {
        const selectedDenom = giftCardDenominations.find(x => x.id === state.giftDenominationId) || giftCardDenominations[0];
        const displayBrand = state.giftBrand === "Other" ? (state.giftCustomName.trim() || "Other Gift Card") : state.giftBrand;
        this.addToCart(`${displayBrand} Gift Card`, `${selectedDenom.label} - ${state.giftRegion}`, selectedDenom.price);
      },
      removeFromCart(id) {
        setState({
          cart: state.cart.filter(item => item.id !== id),
        });
      },
      openCart() {
        setState({ cartOpen: true });
      },
      closeCart() {
        setState({ cartOpen: false });
      },
      goToCheckout() {
        if (state.cart.length === 0) return;
        window.location.href = "checkout.html";
      },
    };

    // ============================================================================
    // INITIALIZATION
    // ============================================================================

    window.addEventListener('DOMContentLoaded', () => {
      loadCart();
      if (new URLSearchParams(window.location.search).get('cart') === 'open') {
        state.cartOpen = true;
      }
      render();
    });
  </script>
</head>
<body class="min-h-screen bg-[#070707] text-white">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute left-[-8rem] top-[-5rem] h-72 w-72 rounded-full bg-yellow-400/10 blur-3xl"></div>
    <div class="absolute right-[-6rem] top-40 h-80 w-80 rounded-full bg-yellow-300/10 blur-3xl"></div>
    <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-yellow-500/10 blur-3xl"></div>
  </div>
  <div id="app"></div>
</body>
